       <!DOCTYPE html>
　　<html lang="en">
　　<head>
　　<meta charset="UTF-8">
　　<meta name="viewport" content="width=device-width,initial-scale=1">
　　<title>A Special Surprise ❤️</title>
　　<style>
　　body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#ff9ecf,#ffe4ef);overflow:hidden}
　　.center{min-height:100vh;display:flex;align-items:center;justify-content:center}
　　.card{background:#fff;padding:30px;border-radius:20px;max-width:700px;width:90%;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.2);position:relative;z-index:2}
　　h1{color:#e91e63}button{padding:12px 24px;border:none;border-radius:30px;background:#e91e63;color:#fff;font-size:18px;cursor:pointer}
　　#content{display:none}#letter{white-space:pre-line;text-align:left;line-height:1.8}
　　.heart{position:fixed;bottom:-30px;animation:float linear infinite;color:#ff4d94}
　　@keyframes float{to{transform:translateY(-120vh)}}
　　img{max-width:100%;border-radius:16px;display:none}
　　#result{font-weight:bold;color:#e91e63;margin-top:20px}
　　</style>
　　</head>
　　<body>
　　<div class="center">
　　<div class="card">
　　<h1>Hi, Jezel ❤️</h1>
　　<p>I know you are stressed and tired already, so let me do this for you, my love. 😘</p>
　　<button id="start">Begin ❤️</button>
　　<div id="content">
　　<div id="letter"></div>
　　<br>

　　<br><br>
　　<h2>Will you go on a date with me? ❤️</h2>
　　<input type="date" id="date"><br><br>
　　<button onclick="yes()">Yes ❤️</button>
　　<button id="no">No 🙈</button>
　　<div id="result"></div>
　　</div>
　　</div>
　　</div>
　　<audio id="music" loop>
　　<source src="Through-the-Years.mp3" type="audio/mpeg">
　　</audio>
　　<script>
　　const text=`My Dearest Jezel ❤️
　　I know you are stressed and tired already,
　　so let me do this for you, my love. 😘
　　Thank you for loving me and always staying by my side.
　　You make every ordinary day feel extraordinary.
　　May I take you on a date? ❤️
　　Love,
　　Baby Clear Jong`;
　　let i=0;
　　document.getElementById('start').onclick=()=>{
　　document.getElementById('content').style.display='block';
　　document.getElementById('start').style.display='none';
　　document.getElementById('music').play().catch(()=>{});
　　type();
　　document.getElementById('slide').style.display='block';
        }
　　function type(){
　　if(i<text.length){
　　document.getElementById('letter').textContent+=text.charAt(i++);
　　setTimeout(type,35);
　　}}
　　const pics=["photo1.jpg","photo2.jpg","photo3.jpg"];
　　let p=0;
　　setInterval(()=>{
　　const s=document.getElementById('slide');
　　if(!s)return;
　　p=(p+1)%pics.length;
　　s.src=pics[p];
　　},3000);
　　for(let j=0;j<35;j++){
　　let h=document.createElement('div');
　　h.className='heart';h.textContent='❤️';
　　h.style.left=Math.random()*100+'vw';
　　h.style.fontSize=(16+Math.random()*20)+'px';
　　h.style.animationDuration=(5+Math.random()*5)+'s';
　　document.body.appendChild(h);
　　}
　　const no=document.getElementById('no');
　　no.onmouseover=()=>{no.style.position='fixed';no.style.left=Math.random()*80+'vw';no.style.top=Math.random()*80+'vh';}
　　function yes(){　　const d=document.getElementById('date').value;
　　document.getElementById('result').innerHTML=d?
　　`Yay! ❤️ Our date is on <b>${d}</b>.<br>I can't wait. I love you always. ❤️`:
　　"Please pick a date first ❤️";
　　}
　　</script>
　　</body>
  </html>
